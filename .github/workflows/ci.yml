name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  VULKAN_SDK_VERSION: 1.4.350.0

jobs:
  build-and-test-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Vulkan SDK
        id: vulkan_sdk
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: ${{ env.VULKAN_SDK_VERSION }}
          cache: true

      - name: Verify Vulkan SDK
        run: |
          $sdkVersion = '${{ env.VULKAN_SDK_VERSION }}'
          $candidates = @()
          if ($env:VULKAN_SDK) {
            $candidates += $env:VULKAN_SDK
          }
          $candidates += "C:\VulkanSDK\$sdkVersion"
          $candidates = $candidates | Select-Object -Unique

          $resolvedSdk = $null
          foreach ($sdkRoot in $candidates) {
            $lib = Join-Path $sdkRoot 'Lib\vulkan-1.lib'
            if (Test-Path $lib) {
              $resolvedSdk = $sdkRoot
              break
            }
          }

          if (-not $resolvedSdk) {
            Write-Host "Vulkan SDK not found via humbletim action; installing LunarG SDK $sdkVersion"
            $installer = Join-Path $env:TEMP "VulkanSDK-$sdkVersion-Installer.exe"
            $url = "https://sdk.lunarg.com/sdk/download/$sdkVersion/windows/VulkanSDK-$sdkVersion-Installer.exe"
            Invoke-WebRequest -Uri $url -OutFile $installer
            & $installer --accept-glisense 1 --confirm-command --quiet
            $resolvedSdk = "C:\VulkanSDK\$sdkVersion"
            $lib = Join-Path $resolvedSdk 'Lib\vulkan-1.lib'
            if (-not (Test-Path $lib)) {
              throw "Vulkan SDK install completed but $lib is missing"
            }
          }

          Write-Host "VULKAN_SDK=$resolvedSdk"
          "VULKAN_SDK=$resolvedSdk" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        env:
          VULKAN_SDK: ${{ env.VULKAN_SDK }}
        run: |
          cmake -S src -B build/ci `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=clang-cl `
            -DCMAKE_CXX_COMPILER=clang-cl `
            -DKYTY_BUILD_LAUNCHER=OFF

      - name: Build tests
        env:
          VULKAN_SDK: ${{ env.VULKAN_SDK }}
        run: cmake --build build/ci --parallel

      - name: Run tests
        working-directory: build/ci
        env:
          VULKAN_SDK: ${{ env.VULKAN_SDK }}
        run: ctest --output-on-failure --parallel
