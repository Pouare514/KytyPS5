name: Compatibility DB

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: read

jobs:
  remind:
    if: contains(github.event.issue.labels.*.name, 'compatibility')
    runs-on: ubuntu-latest
    steps:
      - name: Remind contributor
        uses: actions/github-script@v7
        with:
          script: |
            const body = `Thanks for the compatibility report.

            To land it in the launcher database, open a PR that updates \`compat-db/compatibility_db.json\` with an entry like:

            \`\`\`json
            "${'{'}\"TITLE_ID\"{'}'}": ${'{'}
              "status": "MainMenu",
              "comment": "Your notes here"
            ${'}'}
            \`\`\`

            The launcher downloads the published JSON from project releases.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
